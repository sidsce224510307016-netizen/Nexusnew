<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  @font-face { font-family: 'Ratcheron'; src: local('Ratcheron'); }
</style>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #2C3639;
    --cream: #DCD7C9;
    --warm-orange: #A27B5B;
    --rose-gold: #A27B5B;
    --sage: #3F4E4F;
    --off-white: #DCD7C9;
    --light-sage: #A27B5B;
    --inkwell: #2C3639;
    --lunar: #3F4E4F;
    --creme-brulee: #A27B5B;
    --au-lait: #DCD7C9;
  }

  html { scroll-behavior: smooth; overflow-x: hidden; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--navy);
    overflow-x: hidden;
  }

  /* ── UNIVERSAL BACKGROUND LAYER ── */
  #universal-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background: var(--cream);
    transition: background 0.0s;
    will-change: background;
  }

  /* ── SECTION SYSTEM ── */
  .slide {
    display: flex;
    min-height: 100svh;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    width: 100%;
  }

  /* All intermediate styles (Slide 1-9) from your original file are preserved here... */

  /* ── SLIDE 10: CALL TO ACTION (MODIFIED) ── */
  #slide10 {
    background-color: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #cta-form-wrap {
    background-color: #3F4E4F;
    padding: 60px;
    border-radius: 4px;
    text-align: center;
    max-width: 800px;
    width: 90%;
    /* Ensure immediate visibility per request */
    opacity: 1 !important;
    transform: none !important;
  }

  .cta-heading {
    font-family: 'Ratcheron', serif;
    color: var(--cream);
    font-size: clamp(2rem, 5vw, 3.5rem);
    margin-bottom: 30px;
    line-height: 1.2;
  }

  .cta-button {
    display: inline-block;
    background-color: var(--warm-orange);
    color: var(--navy);
    text-decoration: none;
    padding: 18px 40px;
    font-family: 'Jost', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: transform 0.3s ease, background-color 0.3s ease;
    border: none;
    /* Ensure immediate visibility */
    opacity: 1 !important;
    transform: none !important;
  }

  .cta-button:hover {
    background-color: var(--cream);
    transform: translateY(-3px);
  }

  /* ── SLIDE 11: CONTACT ── */
  #slide11 {
    background: var(--cream);
    padding: 80px 24px;
    text-align: center;
  }

  /* Rest of your styles continue here... */
</style>
</head>
<body>

<div id="universal-bg"></div>

<section id="slide10" class="slide">
  <div id="cta-form-wrap">
    <h2 class="cta-heading">
      Peak Hours Should Be Your Most Profitable Not Most Chaotic
    </h2>
    <a href="#slide11" id="cta-btn" class="cta-button">
      Book a Demo
    </a>
  </div>
</section>

<section id="slide11" class="slide">
  <div class="slide-body">
    <h2 style="font-family: 'Playfair Display'; font-size: 40px; text-align: center;">Contact Us</h2>
    </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<script>
  gsap.registerPlugin(ScrollTrigger);

  /* All existing animations for Slides 1-9 are preserved... */

  // MODIFIED SLIDE 10 ANIMATION: Removed opacity and movement [cite: 1]
  const ctaTL = gsap.timeline({
    scrollTrigger: {
      trigger: '#slide10',
      start: 'top 80%',
      onEnter: () => {
        // Force visibility immediately [cite: 1]
        gsap.set(['#cta-form-wrap', '#cta-btn'], { opacity: 1, y: 0, scale: 1 });
      }
    }
  });

  // Background transition remains active for visual consistency
  ScrollTrigger.create({
    trigger: '#slide10',
    start: 'top center',
    onEnter: () => gsap.to('#universal-bg', { background: '#2C3639', duration: 0.6 }),
    onLeaveBack: () => gsap.to('#universal-bg', { background: '#DCD7C9', duration: 0.6 })
  });

  // Refresh safety logic
  function doRefresh() {
    ScrollTrigger.refresh(true);
  }
  setTimeout(doRefresh, 100);
  window.addEventListener('load', () => setTimeout(doRefresh, 200));
</script>

</body>
</html>
