
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Queue System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* ===============================
       BRAND COLORS
    =============================== */
    :root {
      --vanilla: #F1F0CC;
      --velvet: #3F0D12;
      --sandstone: #D5BF86;
      --crimson: #A71D31;
    }

    /* ===============================
       RESET
    =============================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    /* ===============================
       HERO SECTION
    =============================== */
    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--vanilla);
      overflow: hidden;
    }

    /* Background Video */
    .hero video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: -2;
    }

    /* Dark Overlay */
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(63, 13, 18, 0.75);
      z-index: -1;
    }

    /* Content Container */
    .hero-content {
      max-width: 900px;
      padding: 20px;
    }

    .hero h1 {
      font-size: 3.2rem;
      margin-bottom: 20px;
      font-weight: 700;
    }

    .hero p {
      font-size: 1.2rem;
      color: var(--sandstone);
      margin-bottom: 40px;
    }

    /* Buttons */
    .btn {
      padding: 14px 32px;
      border-radius: 40px;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s ease;
      margin: 10px;
    }

    .btn-primary {
      background: var(--crimson);
      color: var(--vanilla);
    }

    .btn-primary:hover {
      background: #8e1628;
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid var(--sandstone);
      color: var(--sandstone);
    }

    .btn-secondary:hover {
      background: var(--sandstone);
      color: var(--velvet);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 2rem;
      }

      .hero p {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    <video autoplay muted loop playsinline>
      <source src="hero-video.mp4.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <div class="hero-content">
      <h1>Stop Losing Walk-In Revenue.</h1>
      <p>Transform restaurant waiting chaos into structured, revenue-generating flow.</p>

      <button class="btn btn-primary">Book a Demo</button>
      <button class="btn btn-secondary">Watch How It Works</button>
    </div>
  </section>

<script>
  gsap.registerPlugin(ScrollTrigger);

  // 1. Hero Zoom Logic
  const heroTl = gsap.timeline({
    scrollTrigger: {
      trigger: ".hero",
      start: "top top",
      end: "+=150%",
      scrub: 1,
      pin: true,
      anticipatePin: 1
    }
  });
  heroTl.to(".hero video", { scale: 3, ease: "power1.inOut" }, 0);
  heroTl.to(".hero-content", { scale: 2, opacity: 0, ease: "power1.inOut" }, 0);

  // 2. Section 2 List Reveal
  gsap.to(".problem-item", {
    scrollTrigger: { trigger: ".section-2", start: "top 80%" },
    opacity: 1, x: 0, duration: 0.8, stagger: 0.3
  });

  // 3. Section 3 Hover Slider Logic
  const items = document.querySelectorAll('.service-item');
  const slider = document.getElementById('imageSlider');

  items.forEach((item) => {
    item.addEventListener('mouseenter', () => {
      // Manage classes
      items.forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      
      // Calculate slide movement
      const index = item.getAttribute('data-index');
      const slideHeight = document.querySelector('.preview-stage').offsetHeight;
      
      gsap.to(slider, {
        y: -(index * slideHeight),
        duration: 0.8,
        ease: "power3.out"
      });
    });
  });
</script>

</body>
</html>
