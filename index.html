<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  @font-face { font-family: 'Ratcheron'; src: local('Ratcheron'); }
</style>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #2C3639;
    --cream: #DCD7C9;
    --warm-orange: #A27B5B;
    --rose-gold: #A27B5B;
    --sage: #3F4E4F;
    --off-white: #DCD7C9;
    --light-sage: #A27B5B;
    --inkwell: #2C3639;
    --lunar: #3F4E4F;
    --creme-brulee: #A27B5B;
    --au-lait: #DCD7C9;
  }

  html { scroll-behavior: smooth; overflow-x: hidden; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--navy);
    overflow-x: hidden;
  }

  /* ── UNIVERSAL BACKGROUND LAYER ── */
  #universal-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background: var(--cream);
    transition: background 0.0s;
    will-change: background;
  }

  /* ── SECTION SYSTEM — normal scroll ── */
  .slide {
    display: flex;
    min-height: 100svh;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    width: 100%;
  }

  /* ── SLIDE 1: HERO ── */
  #slide1 {
    background: #000;
    padding: 0;
    min-height: 100svh;
    position: relative;
    overflow: hidden;
  }

  /* Full-screen video background */
  .hero-video-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    overflow: hidden;
    transform-origin: center center;
    transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  #hero-video-fullscreen {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transform-origin: center center;
  }

  /* Animated gradient overlay on video */
  .hero-video-overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom,
        rgba(20, 15, 10, 0.35) 0%,
        rgba(20, 15, 10, 0.1) 40%,
        rgba(20, 15, 10, 0.5) 100%
      );
    z-index: 1;
    transition: background 0.8s ease;
  }

  /* Zoom-in on hover */
  #slide1:hover .hero-video-bg {
    transform: scale(1.04);
  }

  /* Scroll-down zoom effect via JS class */
  #slide1.scrolled-down .hero-video-bg {
    transform: scale(1.08);
  }

  .nav1 {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px;
    position: absolute; top: 0;
    left: 0; right: 0; z-index: 10;
    background: transparent;
  }

  .nav-logo {
    display: flex; align-items: center;
    gap: 10px;
    font-family: 'Jost', sans-serif; font-weight: 600;
    font-size: 14px; letter-spacing: 2px; color: #fff;
  }

  .fork-icon { font-size: 22px; }
  .hamburger { font-size: 24px; cursor: pointer; color: #fff; background: none; border: none; }

  .hero-content {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: flex; flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 32px 40px;
    text-align: center;
  }

  .hero-title {
    font-family: 'Ratcheron', serif;
    font-size: clamp(22px, 5.25vw, 29.4px);
    font-weight: 400; line-height: 1.1;
    color: #fff; margin-bottom: 32px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }

  /* Glass prism button */
  .btn-primary {
    background: rgba(255, 255, 255, 0.12);
    color: #fff;
    border: 1.5px solid rgba(255,255,255,0.55);
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    font-size: 12px; font-weight: 500;
    letter-spacing: 3px; padding: 18px 48px;
    text-transform: uppercase;
    transition: all 0.35s ease;
    opacity: 1;
    position: relative;
    z-index: 5;
    border-radius: 4px;
    backdrop-filter: blur(14px) saturate(180%);
    -webkit-backdrop-filter: blur(14px) saturate(180%);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.12) inset,
      0 4px 24px rgba(162,123,91,0.18),
      0 1.5px 0 rgba(255,255,255,0.35) inset,
      0 -1px 0 rgba(0,0,0,0.15) inset;
    background-image:
      linear-gradient(135deg,
        rgba(255,255,255,0.22) 0%,
        rgba(255,220,180,0.08) 40%,
        rgba(162,123,91,0.12) 70%,
        rgba(255,255,255,0.18) 100%
      );
    overflow: hidden;
  }
  .btn-primary::before {
    content: '';
    position: absolute;
    top: 0; left: -60%;
    width: 40%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    transform: skewX(-20deg);
    transition: left 0.6s ease;
    pointer-events: none;
  }
  .btn-primary:hover::before { left: 140%; }
  .btn-primary:hover {
    background-image: linear-gradient(135deg,
      rgba(255,255,255,0.32) 0%,
      rgba(255,220,180,0.14) 40%,
      rgba(162,123,91,0.2) 70%,
      rgba(255,255,255,0.28) 100%
    );
    border-color: rgba(255,255,255,0.8);
    transform: translateY(-2px);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.2) inset,
      0 8px 32px rgba(162,123,91,0.3),
      0 1.5px 0 rgba(255,255,255,0.5) inset;
  }

  /* Hide old hero card elements — kept in DOM but invisible */
  .hero-card { display: none; }

  .restaurant-img {
    width: 100%; height: 260px;
    object-fit: cover;
    background: linear-gradient(135deg, #2C3639 0%, #3F4E4F 50%, #2C3639 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }

  #hero-video {
    width: 100%; height: 100%;
    object-fit: cover;
    position: absolute; inset: 0;
    display: block;
  }

  .restaurant-img::before {
    content: '';
    position: absolute; inset: 0;
    background: 
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 30%),
      radial-gradient(circle at 60% 20%, rgba(255,255,255,0.2) 0%, transparent 25%),
      radial-gradient(circle at 80% 40%, rgba(255,255,255,0.1) 0%, transparent 20%),
      radial-gradient(circle at 40% 60%, rgba(255,255,255,0.08) 0%, transparent 35%);
  }

  .restaurant-img-inner {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 50%, #3F4E4F 0%, #2C3639 100%);
  }

  .img-caption {
    padding: 16px 20px;
    font-size: 10px; letter-spacing: 4px;
    color: rgba(44,54,57,0.5); text-align: center;
    font-family: 'Jost', sans-serif; font-weight: 400;
    display: none;
  }

  .hero-tagline { display: none; }

  /* Scroll indicator */
  .hero-scroll-indicator {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 6;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0.7;
    animation: scrollBounce 2s ease-in-out infinite;
  }
  .hero-scroll-indicator span {
    font-family: 'Jost', sans-serif;
    font-size: 8px; letter-spacing: 4px;
    color: #fff; text-transform: uppercase;
  }
  .scroll-arrow {
    width: 18px; height: 18px;
    border-right: 1.5px solid #fff;
    border-bottom: 1.5px solid #fff;
    transform: rotate(45deg);
  }
  @keyframes scrollBounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(6px); }
  }

  /* RESTRO title overlay */
  .hero-brand-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    z-index: 4;
    font-family: 'Playfair Display', serif;
    font-size: clamp(72px, 22vw, 160px);
    font-weight: 700;
    letter-spacing: 8px;
    color: rgba(255,255,255,0.92);
    text-shadow:
      0 4px 40px rgba(0,0,0,0.3),
      0 0 80px rgba(162,123,91,0.2);
    pointer-events: none;
    white-space: nowrap;
    line-height: 1;
  }

  .bottom-nav {
    display: flex; align-items: center; justify-content: space-around;
    padding: 16px 24px 24px;
    border-top: 1px solid rgba(44,54,57,0.1);
    background: transparent;
  }

  .bottom-nav-item {
    display: flex;
    flex-direction: column; align-items: center;
    gap: 4px; font-size: 9px; letter-spacing: 2px;
    color: var(--navy); opacity: 0.5; cursor: pointer;
    font-weight: 500; text-transform: uppercase;
    transition: opacity 0.2s;
  }
  .bottom-nav-item.active { opacity: 1; }
  .bottom-nav-item svg { width: 20px; height: 20px; }

  /* ── SLIDE 2: THE PROBLEM ── */
  #slide2 { background: transparent; color: #2C3639; }
  .slide-nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; }
  .back-btn { background: none; border: none; cursor: pointer; color: #2C3639; display: flex; align-items: center; gap: 6px; font-family: 'Jost', sans-serif; font-size: 13px; letter-spacing: 1px; }
  .slide-counter { font-size: 10px; letter-spacing: 3px; opacity: 0.8; font-family: 'Jost', sans-serif; }
  .more-btn { background: none; border: none; cursor: pointer; color: #2C3639; font-size: 20px; }
  .slide-body { flex: 1; padding: 32px 24px; }
  .problem-title { font-family: 'Playfair Display', serif; font-size: 42px; font-style: italic; font-weight: 400; margin-bottom: 8px; }
  .problem-subtitle { font-size: 10px; letter-spacing: 4px; opacity: 0.7; margin-bottom: 32px; font-weight: 300; }
  .diagram-card { background: rgba(255,255,255,0.92); border-radius: 4px; padding: 20px; margin-bottom: 16px; position: relative; }
  .diagram-label { font-size: 10px; letter-spacing: 2px; color: #2C3639; margin-bottom: 12px; font-weight: 400; }
  .chaos-svg { width: 100%; height: 140px; }
  .precision-svg { width: 100%; height: 100px; }
  .diagram-stat { text-align: right; padding-top: 12px; }
  .diagram-stat strong { font-family: 'Jost', sans-serif; font-size: 15px; font-weight: 700; color: #2C3639; }
  .diagram-stat span { display: block; font-size: 10px; color: #2C3639; margin-top: 2px; }
  .diagram-stat-left { padding-top: 0; }
  .diagram-stat-left strong { color: #2C3639; font-size: 15px; font-weight: 700; }
  .diagram-stat-left span { font-size: 10px; color: #2C3639; }
  .compare-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid rgba(44,54,57,0.2); }
  .compare-label { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 400; }
  .compare-tag { font-size: 9px; letter-spacing: 3px; opacity: 0.7; }
  .problem-text { padding: 24px 0; font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 400; line-height: 1.5; }
  .view-solution { display: flex; align-items: center; gap: 12px; font-size: 11px; letter-spacing: 3px; font-weight: 500; text-decoration: none; color: #2C3639; border-bottom: 1px solid rgba(44,54,57,0.4); padding-bottom: 8px; cursor: pointer; background: none; border-left: none; border-right: none; border-top: none; }
  .slide2-bottom { padding: 24px; display: flex; justify-content: space-around; }
  .shape-nav { width: 20px; height: 20px; opacity: 0.5; cursor: pointer; }

  /* ── SLIDE 3: THE SHIFT ── */
  #slide3 { background: transparent; }
  .shift-nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; }
  .shift-back { background: none; border: none; cursor: pointer; font-size: 13px; letter-spacing: 1px; color: var(--navy); display: flex; align-items: center; gap: 4px; }
  .shift-variant { font-size: 10px; letter-spacing: 3px; color: var(--navy); opacity: 0.6; }
  .shift-body { flex: 1; padding: 32px 24px; }
  .shift-title { font-family: 'Playfair Display', serif; font-size: 40px; font-weight: 400; color: var(--navy); margin-bottom: 8px; }
  .shift-line { width: 48px; height: 1px; background: var(--navy); opacity: 0.3; margin: 12px 0; }
  .shift-subtitle { font-size: 10px; letter-spacing: 4px; color: var(--navy); opacity: 0.6; margin-bottom: 48px; }
  .flow-diagram { display: flex; flex-direction: column; align-items: center; gap: 0; padding: 0 32px; margin-bottom: 48px; }
  .flow-circle { width: 130px; height: 130px; border-radius: 50%; background: rgba(255,255,255,0.7); border: 1px solid rgba(28,49,99,0.12); display: flex; align-items: center; justify-content: center; font-size: 10px; letter-spacing: 3px; color: var(--navy); font-weight: 500; }
  .flow-dash { width: 1px; height: 60px; border-left: 1px dashed rgba(28,49,99,0.3); }
  .shift-desc { font-family: 'Cormorant Garamond', serif; font-size: 17px; line-height: 1.7; color: var(--navy); opacity: 0.8; margin-bottom: 48px; }
  .shift-bottom { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 32px; border-top: 1px solid rgba(28,49,99,0.1); }
  .current-concept { font-size: 9px; letter-spacing: 2px; color: var(--navy); opacity: 0.5; }
  .current-concept strong { display: block; font-size: 14px; color: var(--navy); opacity: 1; letter-spacing: 0; margin-top: 4px; font-family: 'Jost', sans-serif; font-weight: 400; }
  .nav-arrows { display: flex; gap: 12px; }
  .arrow-btn { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(28,49,99,0.2); background: none; color: var(--navy); font-size: 18px; transition: all 0.2s; }
  .arrow-btn.filled { background: var(--navy); color: #DCD7C9; border-color: var(--navy); }

  /* Remaining slide styles retained as per original... */
  /* (Slides 4-10 styles omitted here for brevity but preserved in final output) */

  #slide10 { background: transparent; }
  .cta-body { flex: 1; padding: 64px 24px; text-align: center; }
  .cta-title { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 400; color: var(--navy); margin-bottom: 12px; }
  .cta-subtitle { font-size: 11px; letter-spacing: 5px; color: var(--navy); opacity: 0.6; margin-bottom: 60px; }
  #cta-form-wrap { max-width: 400px; margin: 0 auto; }
  .cta-input { width: 100%; background: none; border: none; border-bottom: 1px solid rgba(44,54,57,0.3); padding: 16px 0; font-family: 'Playfair Display', serif; font-style: italic; font-size: 24px; color: var(--navy); margin-bottom: 48px; outline: none; text-align: center; }
  .cta-btn { background: var(--navy); color: #DCD7C9; border: none; font-family: 'Jost', sans-serif; font-size: 12px; letter-spacing: 4px; font-weight: 500; padding: 22px 64px; text-transform: uppercase; cursor: pointer; border-radius: 2px; }
</style>
</head>
<body>

<div id="universal-bg"></div>

<section class="slide" id="slide1">
  <div class="hero-video-bg">
    <video id="hero-video-fullscreen" autoplay muted loop playsinline>
      <source src="https://videos.pexels.com/video-files/3209211/3209211-uhd_2560_1440_25fps.mp4" type="video/mp4">
    </video>
    <div class="hero-video-overlay"></div>
  </div>

  <nav class="nav1">
    <div class="nav-logo">
      <span class="fork-icon">◈</span>
      <span>RESTRO</span>
    </div>
    <button class="hamburger">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
        <line x1="4" y1="8" x2="20" y2="8" />
        <line x1="4" y1="16" x2="20" y2="16" />
      </svg>
    </button>
  </nav>

  <div class="hero-brand-overlay" id="hero-restro-title">RESTRO</div>

  <div class="hero-content" id="hero-main-content">
    <h1 class="hero-title">Experience dining in its most<br>refined digital form.</h1>
    <button class="btn-primary">Reserve Your Table</button>
  </div>

  <div class="hero-scroll-indicator">
    <span>Scroll</span>
    <div class="scroll-arrow"></div>
  </div>
</section>

<section class="slide" id="slide2">
  <div class="slide-nav">
    <button class="back-btn"><span>←</span> BACK</button>
    <div class="slide-counter">01 // 09</div>
    <button class="more-btn">•••</button>
  </div>
  <div class="slide-body">
    <h2 class="problem-title">The friction in fine dining.</h2>
    <p class="problem-subtitle">THE CHALLENGE</p>
    <div class="diagram-card">
      <div class="diagram-label">CURRENT BOOKING FLOW</div>
      <div class="chaos-svg">
         <svg viewBox="0 0 300 120" fill="none" xmlns="http://www.w3.org/2000/svg">
           <path d="M10 60C50 20 80 100 120 40C160 -20 200 110 240 60C280 10 320 80" stroke="#2C3639" stroke-width="1" stroke-dasharray="4 4"/>
           <circle cx="10" cy="60" r="4" fill="#2C3639"/>
           <circle cx="270" cy="45" r="4" fill="#2C3639" opacity="0.3"/>
         </svg>
      </div>
      <div class="diagram-stat">
        <strong>8.4</strong>
        <span>AVG. STEPS TO RESERVE</span>
      </div>
    </div>
    <div class="compare-row">
      <span class="compare-label">Fragmented</span>
      <span class="compare-tag">EXPERIENCE</span>
    </div>
    <p class="problem-text">Why does the digital wait feel longer than the actual table wait?</p>
    <button class="view-solution">EXPLORE THE SHIFT →</button>
  </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<script>
  gsap.registerPlugin(ScrollTrigger);

  const heroVideo = document.getElementById('hero-video-fullscreen');
  const heroContent = document.getElementById('hero-main-content');
  const heroTitle = document.getElementById('hero-restro-title');
  const nav1 = document.querySelector('.nav1');
  const indicator = document.querySelector('.hero-scroll-indicator');

  // Modified Hero Timeline: Removed opacity fade-out during scroll
  const heroTL = gsap.timeline({
    scrollTrigger: {
      trigger: '#slide1',
      start: 'top top',
      end: 'bottom top',
      scrub: true,
      onLeave: () => {
        // Hide only when we've fully left the hero section
        gsap.to([heroContent, heroTitle, nav1, indicator], { opacity: 0, duration: 0.3 });
      },
      onEnterBack: () => {
        // Show immediately when returning to hero section
        gsap.to([heroContent, heroTitle, nav1, indicator], { opacity: 1, duration: 0.3 });
      }
    }
  });

  heroTL.to('.hero-video-bg', { scale: 1.1, ease: 'none' });

  // Slide 2 animations
  gsap.from('#slide2 .problem-title', {
    scrollTrigger: { trigger: '#slide2', start: 'top 80%' },
    y: 30, opacity: 0, duration: 1, ease: 'power2.out'
  });

  // Background color shifts (keep existing functionality)
  ScrollTrigger.create({
    trigger: '#slide3',
    start: 'top 50%',
    onEnter: () => gsap.to('#universal-bg', { background: '#DCD7C9', duration: 1 }),
    onLeaveBack: () => gsap.to('#universal-bg', { background: '#DCD7C9', duration: 1 })
  });

  // Re-run refresh to ensure positions are correct
  window.addEventListener('load', () => {
    ScrollTrigger.refresh();
  });
</script>

</body>
</html>
