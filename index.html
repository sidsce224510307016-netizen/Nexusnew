<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RESTRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Premium Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --vanilla: #F1F0CC;
  --velvet: #3F0D12;
  --sandstone: #D5BF86;
  --crimson: #A71D31;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--vanilla);
  overflow-x: hidden;
}

/* ================= HERO ================= */

.hero {
  position: relative;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: var(--vanilla);
  overflow: hidden;
}

.hero video {
  position: absolute;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  transform: translate(-50%, -50%);
  object-fit: cover;
  z-index: -2;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(63, 13, 18, 0.75);
  z-index: -1;
}

/* RESTRO */
.logo-title {
  font-family: 'Playfair Display', serif;
  font-size: 4.5rem;
  letter-spacing: 2px;
  transition: transform 0.2s linear, font-size 0.2s linear;
  position: relative;
}

.hero p {
  font-size: 1.2rem;
  color: var(--sandstone);
  margin: 20px 0 40px;
}

.btn {
  padding: 14px 32px;
  border-radius: 40px;
  border: none;
  font-size: 1rem;
  cursor: pointer;
  margin: 10px;
}

.btn-primary {
  background: var(--crimson);
  color: var(--vanilla);
}

.btn-secondary {
  background: transparent;
  border: 2px solid var(--sandstone);
  color: var(--sandstone);
}

/* ================= SECTION 2 ================= */

.section-2 {
  min-height: 100vh;
  padding: 120px 10%;
  color: var(--velvet);
  opacity: 0;
  transform: scale(0.9);
  transition: all 0.8s ease;
}

.section-2.visible {
  opacity: 1;
  transform: scale(1);
}

.section-2 h2 {
  font-family: 'Playfair Display', serif;
  font-size: 2.8rem;
  margin-bottom: 40px;
}

.problem-list {
  font-size: 1.2rem;
  line-height: 2;
}
</style>
</head>

<body>

<section class="hero">
  <video autoplay muted loop playsinline>
    <source src="hero-video.mp4" type="video/mp4">
  </video>

  <div>
    <h1 class="logo-title" id="logo">RESTRO</h1>
    <p>Transform restaurant waiting chaos into structured, revenue-generating flow.</p>

    <button class="btn btn-primary">Book a Demo</button>
    <button class="btn btn-secondary">Watch How It Works</button>
  </div>
</section>

<section class="section-2" id="section2">
  <h2>Why We Exist</h2>
  <div class="problem-list">
    • Walk-in customers leave due to no table availability<br>
    • Restaurants lose revenue from unstructured queues<br>
    • Kitchens get overwhelmed due to chaotic order bursts<br>
    • Staff coordination breakdown
  </div>
</section>

<script>
const logo = document.getElementById("logo");
const section2 = document.getElementById("section2");

window.addEventListener("scroll", () => {
  const scrollY = window.scrollY;
  const maxScroll = 300;

  let progress = Math.min(scrollY / maxScroll, 1);

  // Smooth live transition
  const scale = 1 - (0.6 * progress);
  const moveX = - (window.innerWidth / 2 - 120) * progress;
  const moveY = - (window.innerHeight / 2 - 40) * progress;

  logo.style.transform = `translate(${moveX}px, ${moveY}px) scale(${scale})`;

  // Zoom reveal for section 2
  if (scrollY > window.innerHeight * 0.6) {
    section2.classList.add("visible");
  }
});
</script>

</body>
</html>
