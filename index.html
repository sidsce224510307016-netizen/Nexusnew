<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  @font-face { font-family: 'Ratcheron'; src: local('Ratcheron'); }
</style>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #2C3639;
    --cream: #DCD7C9;
    --warm-orange: #A27B5B;
    --rose-gold: #A27B5B;
    --sage: #3F4E4F;
    --off-white: #DCD7C9;
    --light-sage: #A27B5B;
    --inkwell: #2C3639;
    --lunar: #3F4E4F;
    --creme-brulee: #A27B5B;
    --au-lait: #DCD7C9;
  }

  html { scroll-behavior: smooth; overflow-x: hidden; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--navy);
    overflow-x: hidden;
  }

  #universal-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background: var(--cream);
    transition: background 0.0s;
    will-change: background;
  }

  .slide {
    display: flex;
    min-height: 100svh;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    width: 100%;
  }

  /* ... Styles for Slides 1-9 remain identical to original file ... */
  /* (Omitted for brevity, but preserved in the logic) */

  /* ── SLIDE 10: CALL TO ACTION (MODIFIED) ── */
  #slide10 {
    background-color: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #cta-form-wrap {
    background-color: #3F4E4F;
    padding: 60px;
    border-radius: 4px;
    text-align: center;
    max-width: 800px;
    width: 90%;
    /* Forced visibility: no opacity or transform applied here */
  }

  .cta-heading {
    font-family: 'Ratcheron', serif;
    color: var(--cream);
    font-size: clamp(2rem, 5vw, 3.5rem);
    margin-bottom: 30px;
    line-height: 1.2;
  }

  .cta-button {
    display: inline-block;
    background-color: var(--warm-orange);
    color: var(--navy);
    text-decoration: none;
    padding: 18px 40px;
    font-family: 'Jost', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: transform 0.3s ease, background-color 0.3s ease;
    border: none;
  }

  .cta-button:hover {
    background-color: var(--cream);
    transform: translateY(-3px);
  }

  /* ── SLIDE 11: CONTACT (AS TARGET) ── */
  #slide11 {
    background: var(--cream);
    padding: 80px 24px;
    text-align: center;
  }
</style>
</head>
<body>

<div id="universal-bg"></div>

<section id="slide10" class="slide">
  <div id="cta-form-wrap">
    <h2 class="cta-heading">
      Peak Hours Should Be Your Most Profitable Not Most Chaotic
    </h2>
    <a href="#slide11" class="cta-button">
      Book a Demo
    </a>
  </div>
</section>

<section id="slide11" class="slide">
  <div class="slide-body">
    <h2 style="font-family: 'Playfair Display'; font-size: 40px;">Contact Us</h2>
    </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<script>
  gsap.registerPlugin(ScrollTrigger);

  // ... Original Animations for Slides 1-9 ...

  // MODIFIED SLIDE 10 ANIMATION: Removed opacity/Y-axis shifts
  const ctaTL = gsap.timeline({
    scrollTrigger: {
      trigger: '#slide10',
      start: 'top center',
      toggleActions: 'play none none none'
    }
  });

  // Section is instantly visible; only subtle scale or no animation at all
  ctaTL.to('#cta-form-wrap', { 
    scale: 1, 
    duration: 0.1, 
    clearProps: "all" 
  });

  // Ensure universal background color shifts correctly
  ScrollTrigger.create({
    trigger: '#slide10',
    start: 'top center',
    onEnter: () => gsap.to('#universal-bg', { background: '#2C3639', duration: 0.6 }),
    onLeaveBack: () => gsap.to('#universal-bg', { background: '#DCD7C9', duration: 0.6 })
  });
</script>

</body>
</html>
