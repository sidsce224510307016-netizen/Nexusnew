<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RESTRO - Cinematic Experience</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
:root {
  --vanilla: #F1F0CC;
  --velvet: #3F0D12;
  --sandstone: #D5BF86;
  --crimson: #A71D31;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--velvet); /* Background matches hero for smooth transition */
  overflow-x: hidden;
  color: var(--vanilla);
}

/* ================= CONTAINER ================= */
#smooth-wrapper {
  overflow: hidden;
  position: fixed;
  height: 100%;
  width: 100%;
  top: 0;
  left: 0;
}

/* ================= HERO (The Zoom Layer) ================= */
.hero {
  position: relative;
  height: 100vh;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
}

.hero video {
  position: absolute;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  transform: translate(-50%, -50%);
  object-fit: cover;
  z-index: 1;
  will-change: transform;
}



.hero-content {
  position: relative;
  z-index: 3;
  will-change: transform, opacity;
}

.logo-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(3rem, 10vw, 8rem);
  letter-spacing: 8px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.hero p {
  font-size: 1.2rem;
  color: var(--sandstone);
  margin-bottom: 30px;
}

/* ================= BUTTONS ================= */
.btn {
  padding: 14px 32px;
  border-radius: 40px;
  border: none;
  font-size: 1rem;
  cursor: pointer;
  margin: 10px;
  font-weight: 600;
  transition: 0.3s;
}

.btn-primary { background: var(--crimson); color: var(--vanilla); }
.btn-secondary { background: transparent; border: 2px solid var(--sandstone); color: var(--sandstone); }
.btn:hover { transform: scale(1.05); opacity: 0.9; }

/* ================= SECTION 2 (The Reveal) ================= */
.section-2 {
  position: relative;
  min-height: 100vh;
  padding: 100px 10%;
  background: var(--vanilla);
  color: var(--velvet);
  z-index: 10;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.section-2 h2 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 5vw, 3.5rem);
  margin-bottom: 40px;
}

.problem-list {
  font-size: 1.5rem;
  line-height: 1.8;
  max-width: 800px;
}

.problem-item {
  margin-bottom: 20px;
  opacity: 0;
  transform: translateX(-30px);
}
</style>
</head>

<body>

  <section class="hero">
    <video autoplay muted loop playsinline>
      <source src="hero-video.mp4" type="video/mp4">
    </video>

    <div class="hero-content">
      <h1 class="logo-title">RESTRO</h1>
      <p>Transform restaurant waiting chaos into revenue flow.</p>
      <div class="hero-btns">
        <button class="btn btn-primary">Book a Demo</button>
        <button class="btn btn-secondary">Watch Video</button>
      </div>
    </div>
  </section>

  <section class="section-2">
    <h2>Why We Exist</h2>
    <div class="problem-list">
      <div class="problem-item">• Walk-in customers leave due to long wait times.</div>
      <div class="problem-item">• Restaurants lose 15% revenue from manual queuing.</div>
      <div class="problem-item">• Kitchens get overwhelmed by unmanaged crowds.</div>
      <div class="problem-item">• Staff burnout from chaotic coordination.</div>
    </div>
  </section>

<script>
  gsap.registerPlugin(ScrollTrigger);

  // 1. THE TELESCOPE ZOOM
  // We scale the video and content up as we scroll
  const tl = gsap.timeline({
    scrollTrigger: {
      trigger: ".hero",
      start: "top top",
      end: "+=150%", // How long the zoom lasts
      scrub: 1,      // Smoothly follows the scroll
      pin: true,     // Locks the hero in place
      anticipatePin: 1
    }
  });

  tl.to(".hero video", {
    scale: 3,        // Zooms "into" the video
    ease: "power1.inOut"
  }, 0);

  tl.to(".hero-content", {
    scale: 2,        // Zooms the text faster
    opacity: 0,      // Fades out as it hits the "camera"
    ease: "power1.inOut"
  }, 0);

  // 2. REVEAL THE LIST ITEMS ONE BY ONE
  gsap.to(".problem-item", {
    scrollTrigger: {
      trigger: ".section-2",
      start: "top 80%",
    },
    opacity: 1,
    x: 0,
    duration: 0.8,
    stagger: 0.3 // Delays each bullet point slightly
  });
</script>

</body>
</html>
