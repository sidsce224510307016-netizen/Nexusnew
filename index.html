<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RESTRO - Cinematic Experience</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
:root {
  --vanilla: #F1F0CC;
  --velvet: #3F0D12;
  --sandstone: #D5BF86;
  --crimson: #A71D31;
  --black: #0a0a0a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--velvet);
  overflow-x: hidden;
  color: var(--vanilla);
}

/* ================= HERO (Zoom Layer) ================= */
.hero {
  position: relative;
  height: 100vh;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
}

.hero video {
  position: absolute;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  transform: translate(-50%, -50%);
  object-fit: cover;
  z-index: 1;
}

.hero-content { position: relative; z-index: 3; }

.logo-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(3rem, 10vw, 8rem);
  letter-spacing: 8px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.hero p {
  font-size: 1.2rem;
  color: var(--sandstone);
  margin-bottom: 30px;
}

.btn {
  padding: 14px 32px;
  border-radius: 40px;
  border: none;
  font-size: 1rem;
  cursor: pointer;
  margin: 10px;
  font-weight: 600;
  transition: 0.3s;
}

.btn-primary { background: var(--crimson); color: var(--vanilla); }
.btn-secondary { background: transparent; border: 2px solid var(--sandstone); color: var(--sandstone); }

/* ================= NEW CARD SECTION (Interactive Fan) ================= */
.section-cards {
  position: relative;
  min-height: 120vh;
  padding: 100px 5%;
  background: var(--vanilla);
  color: var(--velvet);
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
}

.section-cards h2 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.5rem, 5vw, 4rem);
  margin-bottom: 10px;
}

.card-stack-container {
  position: relative;
  height: 600px;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  perspective: 1200px;
  margin-top: 40px;
}

.video-card {
  position: absolute;
  width: 320px;
  height: 480px;
  border-radius: 20px;
  overflow: hidden;
  background: var(--black);
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  cursor: pointer;
  transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 30px;
}

.video-card img {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 0;
  opacity: 0.8;
  transition: opacity 0.3s ease;
}

.card-text {
  position: relative;
  z-index: 2;
  color: white;
  pointer-events: none;
}

.card-text h3 {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  margin-bottom: 5px;
}

.card-text p {
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  opacity: 0.8;
}

/* State: Card Selected/Focused */
.video-card.is-focused {
  z-index: 100 !important;
  transform: scale(1.1) translateY(-40px) rotate(0deg) !important;
  box-shadow: 0 40px 80px rgba(0,0,0,0.6);
}

.video-card.is-focused img { opacity: 1; }

</style>
</head>

<body>

  <section class="hero">
    <video autoplay muted loop playsinline>
      <source src="hero-video.mp4" type="video/mp4">
    </video>

    <div class="hero-content">
      <h1 class="logo-title">RESTRO</h1>
      <p>Transform restaurant waiting chaos into revenue flow.</p>
      <div class="hero-btns">
        <button class="btn btn-primary">Book a Demo</button>
        <button class="btn btn-secondary">Watch Video</button>
      </div>
    </div>
  </section>

  <section class="section-cards">
    <h2>Our Vision</h2>
    <p>Click to explore, Double Click to enter</p>
  
    <div class="card-stack-container" id="cardStack">
      <div class="video-card" data-url="why-we-exist.html">
        <img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=800" alt="Vision">
        <div class="card-text">
          <h3>Why We Exist</h3>
          <p>The Mission</p>
        </div>
      </div>

      <div class="video-card" data-url="need.html">
        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=800" alt="Market">
        <div class="card-text">
          <h3>The Need</h3>
          <p>Problem Solving</p>
        </div>
      </div>

      <div class="video-card" data-url="website.html">
        <img src="https://images.unsplash.com/photo-1507238691740-187a5b1d37b8?w=800" alt="Tech">
        <div class="card-text">
          <h3>Website</h3>
          <p>Digital Presence</p>
        </div>
      </div>

      <div class="video-card" data-url="contact.html">
        <img src="https://images.unsplash.com/photo-1558655146-d09347e92766?w=800" alt="Contact">
        <div class="card-text">
          <h3>Contact Us</h3>
          <p>Get in Touch</p>
        </div>
      </div>
    </div>
  </section>

<script>
  gsap.registerPlugin(ScrollTrigger);

  // 1. Hero Zoom Logic (Preserved from your code)
  const heroTl = gsap.timeline({
    scrollTrigger: {
      trigger: ".hero",
      start: "top top",
      end: "+=150%",
      scrub: 1,
      pin: true,
      anticipatePin: 1
    }
  });
  heroTl.to(".hero video", { scale: 3, ease: "power1.inOut" }, 0); [cite: 42]
  heroTl.to(".hero-content", { scale: 2, opacity: 0, ease: "power1.inOut" }, 0); [cite: 42]

  // 2. Card Stack Fan Animation
  const cards = document.querySelectorAll('.video-card');

  // Spread cards into a fan shape initially
  gsap.set(cards, {
    rotate: (i) => (i - 1.5) * 15, // Spreads them in an arc
    x: (i) => (i - 1.5) * 50,
    transformOrigin: "bottom center"
  });

  // Reveal cards as user scrolls down
  gsap.from(cards, {
    scrollTrigger: {
      trigger: ".section-cards",
      start: "top 70%",
    },
    y: 400,
    opacity: 0,
    stagger: 0.1,
    duration: 1.2,
    ease: "expo.out"
  });

  // 3. Click Interaction Logic
  cards.forEach(card => {
    // Focus Card on Click
    card.addEventListener('click', () => {
      cards.forEach(c => c.classList.remove('is-focused'));
      card.classList.add('is-focused');
    });

    // Zoom & Redirect on Double Click
    card.addEventListener('dblclick', () => {
      const url = card.getAttribute('data-url');
      
      const tl = gsap.timeline();
      tl.to(card, {
        scale: 5,
        opacity: 0,
        duration: 0.7,
        ease: "power2.in"
      })
      .to("body", { backgroundColor: "#000", duration: 0.3 }, "-=0.3")
      .add(() => {
        window.location.href = url;
      });
    });
  });
</script>

</body>
</html>
