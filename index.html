<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RESTRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Premium Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

<style>
:root {
  --vanilla: #F1F0CC;
  --velvet: #3F0D12;
  --sandstone: #D5BF86;
  --crimson: #A71D31;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--vanilla);
  overflow-x: hidden;
}

/* HERO */
.hero {
  position: relative;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: var(--vanilla);
  overflow: hidden;
}

.hero video {
  position: absolute;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  transform: translate(-50%, -50%);
  object-fit: cover;
  z-index: -2;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(63,13,18,0.75);
  z-index: -1;
}

.hero-content {
  position: relative;
  z-index: 2;
}

.logo-title {
  font-family: 'Playfair Display', serif;
  font-size: 5rem;
  letter-spacing: 3px;
}

.hero p {
  margin: 20px 0 40px;
  color: var(--sandstone);
  font-size: 1.2rem;
}

.btn {
  padding: 14px 32px;
  border-radius: 40px;
  border: none;
  cursor: pointer;
  margin: 10px;
}

.btn-primary {
  background: var(--crimson);
  color: var(--vanilla);
}

.btn-secondary {
  background: transparent;
  border: 2px solid var(--sandstone);
  color: var(--sandstone);
}

/* SECTION 2 */
.section-2 {
  min-height: 100vh;
  padding: 120px 10%;
  color: var(--velvet);
  transform: scale(0.9);
  opacity: 0;
}

.section-2 h2 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  margin-bottom: 40px;
}

.problem-list {
  font-size: 1.2rem;
  line-height: 2;
}

/* Fixed Logo Final Position */
.fixed-logo {
  position: fixed !important;
  top: 30px;
  left: 40px;
  font-size: 1.8rem !important;
  color: var(--velvet) !important;
  z-index: 1000;
}
</style>
</head>

<body>

<section class="hero">
  <video autoplay muted loop playsinline>
    <source src="hero-video.mp4" type="video/mp4">
  </video>

  <div class="hero-content">
    <h1 class="logo-title" id="logo">RESTRO</h1>
    <p>Transform restaurant waiting chaos into structured revenue flow.</p>

    <button class="btn btn-primary">Book a Demo</button>
    <button class="btn btn-secondary">Watch How It Works</button>
  </div>
</section>

<section class="section-2" id="section2">
  <h2>Why We Exist</h2>
  <div class="problem-list">
    • Walk-in customers leave due to no table availability<br>
    • Restaurants lose revenue from unstructured queues<br>
    • Kitchens get overwhelmed due to chaotic order bursts<br>
    • Staff coordination breakdown
  </div>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

const logo = document.getElementById("logo");
const heroContent = document.querySelector(".hero-content");
const section2 = document.getElementById("section2");

// HERO TIMELINE
gsap.timeline({
  scrollTrigger: {
    trigger: ".hero",
    start: "top top",
    end: "bottom top",
    scrub: true
  }
})
.to(logo, {
  scale: 0.4,
  x: -window.innerWidth / 2 + 120,
  y: -window.innerHeight / 2 + 80,
  ease: "power2.out"
}, 0)
.to(heroContent, {
  opacity: 0.2,
  ease: "power1.out"
}, 0);

// SECTION 2 REVEAL
gsap.to(section2, {
  scrollTrigger: {
    trigger: section2,
    start: "top 80%",
  },
  scale: 1,
  opacity: 1,
  duration: 1,
  ease: "power3.out"
});
</script>

</body>
</html>
